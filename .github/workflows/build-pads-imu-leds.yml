name: Build pads_imu_leds firmware

# Compila firmwares/pads_imu_leds/pads_imu_leds.ino para el ESP32-S3 y publica
# el firmware.bin "merged" (flasheable a offset 0x0) como artifact y como Release.
# Pensado para flashear desde el teléfono (Android + app OTG): descargas el .bin
# desde la pestaña Releases del repo y lo cargas a 0x0.

on:
  workflow_dispatch:
  push:
    branches:
      - claude/lucid-pasteur-s2beae
    paths:
      - 'firmwares/pads_imu_leds/**'
      - '.github/workflows/build-pads-imu-leds.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core + FastLED (versiones fijas estables)
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          # El firmware exige core 3.x (usa driver/i2s_std.h). Se fija el core al
          # 3.x más estable/probado (3.0.7, IDF 5.1) en vez de "el último", que es
          # la diferencia frente a la compilación de PC que sí funcionaba. FastLED
          # debe ser moderna (driver RMT5) para compilar en IDF5: 3.9.0.
          arduino-cli core install esp32:esp32@3.0.7
          arduino-cli lib install FastLED@3.9.0
          echo "--- versiones instaladas ---"
          arduino-cli core list
          arduino-cli lib list

      - name: Compile (ESP32S3 Dev Module · CDC On Boot · Flash DIO · OPI PSRAM)
        run: |
          mkdir -p build
          arduino-cli compile \
            --fqbn "esp32:esp32:esp32s3:CDCOnBoot=cdc,FlashMode=dio,FlashSize=4M,PSRAM=opi,PartitionScheme=default" \
            --output-dir build \
            firmwares/pads_imu_leds/pads_imu_leds.ino

      - name: Stage firmware files (merged + separados con offset en el nombre)
        run: |
          ls -la build
          mkdir -p dist
          # Imagen merged completa (flasheable a 0x0)
          cp build/pads_imu_leds.ino.merged.bin           dist/firmware.bin
          # Archivos por separado, igual que Arduino IDE (offset en el nombre)
          cp build/pads_imu_leds.ino.bootloader.bin       dist/bootloader_0x0.bin
          cp build/pads_imu_leds.ino.partitions.bin       dist/partitions_0x8000.bin
          cp build/pads_imu_leds.ino.bin                  dist/app_0x10000.bin
          # boot_app0 (otadata) viene del core, no del compile
          BA0=$(find "$HOME/.arduino15/packages/esp32" -name boot_app0.bin | head -1)
          cp "$BA0" dist/boot_app0_0xe000.bin
          echo "---- dist ----"
          ls -la dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pads_imu_leds-firmware
          path: dist/*

      - name: Publish Release (download directo desde el teléfono)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pads_imu_leds-fw
          name: pads_imu_leds firmware
          body: |
            Firmware pads_imu_leds para ESP32-S3.
            Settings: ESP32S3 Dev Module · CDC On Boot Enabled · Flash Mode DIO · OPI PSRAM.

            FLASHEO DESDE ANDROID (app ESP32_Flasher, chip ESP32-S3, Compression OFF):

            >>> RECOMENDADO si el equipo ya tiene bootloader (arranca pero dice
                "invalid header"): flashear SOLO la app:
                  - app_0x10000.bin            -> offset 0x10000

            >>> COMPLETO (equivale a Arduino IDE), 4 archivos con su offset:
                  - bootloader_0x0.bin         -> offset 0x0
                  - partitions_0x8000.bin      -> offset 0x8000
                  - boot_app0_0xe000.bin       -> offset 0xe000
                  - app_0x10000.bin            -> offset 0x10000

            >>> firmware.bin (merged, todo en uno) -> offset 0x0
                (NO recomendado por OTG: son 4 MB y la escritura se corta).
          files: |
            dist/firmware.bin
            dist/bootloader_0x0.bin
            dist/partitions_0x8000.bin
            dist/boot_app0_0xe000.bin
            dist/app_0x10000.bin
